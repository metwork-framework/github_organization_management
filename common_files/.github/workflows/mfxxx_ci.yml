name: ci_build

on:
  push:
    branches: 
      - master
      - integration
      - experimental*
      - release_*
      - ci*
      - pci* 
      - github*
    tags:
      - v*
  pull_request:
  repository_dispatch:
    types: metwork-trigger

env:
    OS_VERSION: centos6
    MFMODULE: MFEXT
    MFMODULE_LOWERCASE: mfext
    DOCKER_RUN_OPTIONS: "-v {% raw %}${{ github.workspace }}{% endraw %}:/src -e GITHUB_REF -e MFMODULE_LOWERCASE -e GITHUB_RUN_NUMBER -e GITHUB_SHA -e GITHUB_REPOSITORY -e TARGET_DIR -e OS_VERSION"
    WORKFLOW_SCRIPTS_DIR: .github/workflows
    DOCKER_WORKFLOW_SCRIPTS_DIR: /src/.github/workflows
    PAYLOAD_BRANCH: {% raw %}${{ github.event.client_payload.branch}}{% endraw %}

jobs:
  ci_build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0
          ref: {% raw %}${{ github.event.client_payload.branch || github.ref }}{% endraw %}
      - name: set variables
        id: SetVariables
        run: |
          ${WORKFLOW_SCRIPTS_DIR}/set_variables.sh
      - name: debug env
        run: |
          env
      - name: bootstrap
        if: {% raw %}${{ steps.SetVariables.outputs.branch != 'null' }}{% endraw %}
        run: |
          export TARGET_DIR={% raw %}${{ steps.SetVariables.outputs.target_dir }}{% endraw %}
          DEP_DIR={% raw %}${{ steps.SetVariables.outputs.dep_dir }}{% endraw %}
          BUILDIMAGE={% raw %}${{ steps.SetVariables.outputs.buildimage }}{% endraw %}
          docker run ${DOCKER_RUN_OPTIONS} -e DEP_DIR=${DEP_DIR} --rm ${BUILDIMAGE} /bin/bash -c "${DOCKER_WORKFLOW_SCRIPTS_DIR}/bootstrap.sh"
      - name: build
        if: {% raw %}${{ steps.SetVariables.outputs.branch != 'null' }}{% endraw %}
        id: BuildStep
        run: |
          export TARGET_DIR={% raw %}${{ steps.SetVariables.outputs.target_dir }}{% endraw %}
          export REPO={% raw %}${{ steps.SetVariables.outputs.repository }}{% endraw %}
          BRANCH={% raw %}${{ steps.SetVariables.outputs.branch }}{% endraw %}
          TAG={% raw %}${{ steps.SetVariables.outputs.tag }}{% endraw %}
          DEP_BRANCH={% raw %}${{ steps.SetVariables.outputs.dep_branch }}{% endraw %}
          BUILDIMAGE={% raw %}${{ steps.SetVariables.outputs.buildimage }}{% endraw %}
          docker run ${DOCKER_RUN_OPTIONS} -e BRANCH=${BRANCH} -e DEP_BRANCH=${DEP_BRANCH} -e TAG=${TAG} -e REPO=${REPO} --rm ${BUILDIMAGE} /bin/bash -c "${DOCKER_WORKFLOW_SCRIPTS_DIR}/build.sh"
      - name: check ssh connect as ssh-scp-ssh-pipelines does not do it
        if: {% raw %}${{ github.event_name != 'pull_request' && steps.SetVariables.outputs.branch != 'null' }}{% endraw %}
        uses: appleboy/ssh-action@master
        with:
          host: {% raw %}${{ secrets.PUB_HOST }}{% endraw %}
          username: {% raw %}${{ secrets.PUB_USERNAME }}{% endraw %}
          password: {% raw %}${{ secrets.PUB_PASSWORD }}{% endraw %}
          port: 22
          script: |
            pwd
      - name: publish buildlogs
        if: {% raw %}${{ github.event_name != 'pull_request' && steps.SetVariables.outputs.branch != 'null' }}{% endraw %}
        uses: cross-the-world/ssh-scp-ssh-pipelines@latest
        env:
          REMOTE: {% raw %}${{ steps.SetVariables.outputs.buildlog_dir }}{% endraw %}
          LOCAL: {% raw %}${{ github.workspace }}/buildlogs{% raw %}
        with:
          host: {% raw %}${{ secrets.PUB_HOST }}{% endraw %}
          user: {% raw %}${{ secrets.PUB_USERNAME }}{% endraw %}
          pass: {% raw %}${{ secrets.PUB_PASSWORD }}{% endraw %}
          port: 22
          first_ssh: |
            mkdir -p ${REMOTE}
          scp: |
            '${LOCAL}/*' => ${REMOTE}
      - name: integration tests
        if: {% raw %}${{ steps.SetVariables.outputs.branch != 'null' }}{% endraw %}
        run: |
          TESTIMAGE={% raw %}${{ steps.SetVariables.outputs.testimage }}{% endraw %}
          DEP_BRANCH={% raw %}${{ steps.SetVariables.outputs.dep_branch }}{% endraw %}
          docker run ${DOCKER_RUN_OPTIONS} -e DEP_BRANCH=${DEP_BRANCH} --rm ${TESTIMAGE} /bin/bash -c "${DOCKER_WORKFLOW_SCRIPTS_DIR}/integration_tests.sh"
      - name: publish rpms
        if: {% raw %}${{ github.event_name != 'pull_request' && steps.SetVariables.outputs.branch != 'null' }}{% endraw %}
        uses: cross-the-world/ssh-scp-ssh-pipelines@latest
        env:
          REMOTE: {% raw %}${{ steps.SetVariables.outputs.rpm_dir }}{% endraw %}
          LOCAL: {% raw %}${{ github.workspace }}{% endraw %}/rpms
        with:
          host: {% raw %}${{ secrets.PUB_HOST }}{% endraw %}
          user: {% raw %}${{ secrets.PUB_USERNAME }}{% endraw %}
          pass: {% raw %}${{ secrets.PUB_PASSWORD }}{% endraw %}
          port: 22
          first_ssh: |
            mkdir -p ${REMOTE}
          scp: |
            '${LOCAL}/metwork-*.rpm' => ${REMOTE}
          last_ssh: |
            createrepo ${REMOTE} 
      - name: publish doc
        if: {% raw %}${{ github.event_name != 'pull_request' && steps.SetVariables.outputs.branch != 'null' }}{% endraw %}
        uses: cross-the-world/ssh-scp-ssh-pipelines@latest
        env:
          REMOTE: {% raw %}${{ steps.SetVariables.outputs.doc_dir }}{% endraw %}
          LOCAL: {% raw %}${{ github.workspace }}{% endraw %}/html_doc
        with:
          host: {% raw %}${{ secrets.PUB_HOST }}{% endraw %}
          user: {% raw %}${{ secrets.PUB_USERNAME }}{% endraw %}
          pass: {% raw %}${{ secrets.PUB_PASSWORD }}{% endraw %}
          port: 22
          first_ssh: |
            rm -rf ${REMOTE}
            mkdir -p ${REMOTE}
          scp: |
            '${LOCAL}/*' => ${REMOTE}
